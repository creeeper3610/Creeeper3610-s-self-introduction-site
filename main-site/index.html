<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>自己紹介サイト</title>
  <link rel="icon" type="image/png" href="../main-site/Tux.png">
  <link rel="stylesheet" href="../main-site/style.css">
<body>

  <a class="back-button"
     href="../go-to-main-site/index.html">
    ← 戻る
  </a>

  <div class="wrapper">
    <img src="../main-site/1.png" class="slide">
    <img src="../main-site/2.png" class="slide">
    <img src="../main-site/3.png" class="slide">
    <img src="../main-site/4.png" class="slide">
    <img src="../main-site/5.png" class="slide">
    <img src="../main-site/6.png" class="slide">
    <img src="../main-site/7.png" class="slide">
    <img src="../main-site/8.png" class="slide">
    <img src="../main-site/9.png" class="slide">
    <img src="../main-site/10.png" class="slide">
    <img src="../main-site/11.png" class="slide">
    <img src="../main-site/12.png" class="slide">
    <img src="../main-site/13.png" class="slide">
    <img src="../main-site/14.png" class="slide">

    <!-- 14枚目の下のボタン -->
    <a class="try-button" href="https://creeeper3610-github-io.vercel.app/" target="_blank">
      実際に試す
    </a>
  </div>

  <!-- エラー音 -->
  <audio id="criticalSound" src="../main-site/windows-xp-critical-stop_C_major.wav"></audio>

  <!-- 黒→白→The End の演出レイヤー -->
  <div id="blackout"></div>
  <div id="whiteout"></div>
  <div id="fineText">The End</div>

  <script>
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {

        const audio = document.getElementById("criticalSound");
        audio.currentTime = 0;
        audio.play().catch(() => {});

        // 黒画面を即座に表示
        const black = document.getElementById("blackout");
        black.style.display = "block";

        // ★ 黒画面のまま 2 秒待つ
        setTimeout(() => {
          const white = document.getElementById("whiteout");
          white.style.display = "block";
          white.style.opacity = "1";
        }, 2000);

        // ★ 白フェード開始から 1 秒後に「The End」
        setTimeout(() => {
          const fine = document.getElementById("fineText");
          fine.style.display = "block";
          fine.style.opacity = "1";
        }, 3000);
      }
    });
  </script>

</body>
</html>
